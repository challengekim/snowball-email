# snowball-email — config schema reference (do not edit manually)
# Use `snowball-email config set <key> <value>` or `snowball-email init` instead.
#
# This file documents the shape of inboxes/<inbox>/config.yaml.
# Each user inbox owns its own config file; multiple inboxes are supported.
#
# Sections are split into:
#   IMPLEMENTED — read by the current code; safe to set
#   FUTURE      — designed in PLAN.md, NOT yet wired; setting has no effect

# =============================================================================
# IMPLEMENTED — these keys are read by the code today
# =============================================================================

inbox:
  name: string                    # logical inbox identifier (e.g., "support", "partnerships")
  label: string                   # Gmail label name (e.g., "스터디파이_서포트")
  persona: cs|bd|recruiting|partnerships|sales|custom  # selected at init; seeds principles + patterns
  language: ko|en                 # primary draft language; default ko

send:
  backend: gws_drafts|gws_send|sendgrid
  # gws_drafts (default — safe, never auto-sends):
  #   creates Gmail drafts; user manually presses Send in Gmail UI
  # gws_send:
  #   sends directly via gws cli; the authenticated Gmail account must
  #   own the from_email or have it as a verified send-as alias
  # sendgrid:
  #   plug-in backend; reads API key from env (see send.sendgrid.api_key_env)
  from_email: string              # sender address shown to recipient
  from_name: string               # sender display name
  bcc: string                     # optional self-BCC for audit; empty string disables
  sendgrid:
    api_key_env: string           # default "SENDGRID_API_KEY"; only used by sendgrid backend

draft:
  signoff: string                 # final-line signature (e.g., "감사합니다.")

classify:
  backend: substring|llm_anthropic  # default substring (free, offline)
  api_key_env: string             # default "ANTHROPIC_API_KEY"; only used by llm_anthropic
  # llm_anthropic falls back to substring on any error (missing key, network, parse).

learn:
  auto_case: bool                 # default false; auto-append approved+sent replies to cases/<cls>.jsonl
                                  # (skipped for dry-run / UNKNOWN)

